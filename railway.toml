# Railway deployment configuration — Principle #8 (Infrastructure as Code)
# This file is read by Railway on every deploy.

[build]
builder = "NIXPACKS"
# Nixpacks runs `npm ci` automatically; we only need to add the
# Prisma generate + TypeScript compile steps on top.
buildCommand = "npm run prisma:generate && npm run build"

[deploy]
# `prisma migrate deploy` (NOT `migrate dev`) is the production-safe
# command — applies pending migrations, never prompts, never generates.
startCommand = "npx prisma migrate deploy && node dist/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
